# Auto-deploy the FastAPI backend to Fly.io when backend code changes land
# on main. Uses Fly's remote builder so the GitHub runner stays light.
#
# Requires repo secret FLY_API_TOKEN (Settings → Secrets and variables →
# Actions). Generate it locally with:  fly tokens create deploy -x 999999h
#
# No untrusted input from github.event.* is referenced — only the
# FLY_API_TOKEN secret and a hardcoded working directory.

name: Fly Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-tracker-backend
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
