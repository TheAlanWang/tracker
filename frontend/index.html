<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trackly</title>
    <meta
      name="description"
      content="A multi-tenant task tracker where your team and your AI drive the same board — built-in Claude agent + MCP server. FastAPI + React + Supabase."
    />

    <!-- Open Graph / social share preview (LinkedIn, Slack, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Trackly" />
    <meta property="og:title" content="Trackly — your team and your AI, on the same board" />
    <meta
      property="og:description"
      content="A multi-tenant task tracker with a built-in Claude agent + an OAuth-secured MCP server (works in Claude Code / Cursor). FastAPI + React + Supabase."
    />
    <meta property="og:url" content="https://gettrackly.dev/" />
    <meta property="og:image" content="https://gettrackly.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Trackly — your team and your AI, on the same board" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trackly — your team and your AI, on the same board" />
    <meta
      name="twitter:description"
      content="A multi-tenant task tracker with a built-in Claude agent + an MCP server. FastAPI + React + Supabase."
    />
    <meta name="twitter:image" content="https://gettrackly.dev/og-image.png" />
    <!-- Apply persisted theme before React mounts so the first paint
         matches the user's preference. Without this, light styles
         flash for ~100ms when the page loads in dark mode. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem("tracker-theme");
          var dark =
            v === "dark" ||
            ((v === "system" || !v) &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
