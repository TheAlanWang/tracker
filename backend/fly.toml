# Tracker backend on Fly.io.
#
# Free-tier sizing: one shared-cpu-1x VM with 256 MB RAM kept always-on so
# requests don't pay a cold-start. 24×7 stays inside the free monthly hours.
# If memory pressure shows up under load, bump `memory_mb` to 512 — still
# within the free credit on a single VM.

app = "tracker-thealanwang"
primary_region = "iad"  # US East (Ashburn). Change to sjc / lax / sea if closer.

[build]

[env]
  # Tells backend/app/core/config.py to load .env.prd convention. Real values
  # are injected via `fly secrets set`, not from a file inside the image.
  APP_ENV = "prd"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine always running so /health is immediate. Auto-start
  # additional machines under load (we cap with min/max = 1 below).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  # Bumped from 5s → 15s so a single-worker uvicorn busy with a slow
  # outbound request (e.g. JWKS fetch on cold cache) doesn't get marked
  # unhealthy and cause PR04 load-balancing errors.
  timeout = "15s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  # 512MB headroom — 256 was tight for Python + FastAPI + supabase-py
  # + cached JWKS; under load we saw OOM-adjacent slowness that tripped
  # the health check.
  memory_mb = 512
